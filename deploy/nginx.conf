# =====================================================================
# my-agentscope-java 分布式部署 Nginx 配置示例
# 关键点:
#   1. consistent hash 按 user 参数路由 (sticky session)
#   2. SSE 必须 disable proxy buffering, 否则前端拿不到流式 token
#   3. 长连接读超时拉到 1 小时 (LLM 思考可能很慢)
# =====================================================================

# 自定义 log_format 加 upstream_addr，方便调试 sticky 路由是否命中
log_format upstream_log '$remote_addr "$request" → $upstream_addr (sticky_key=$sticky_key, $status, ${request_time}s)';
access_log /var/log/nginx/access.log upstream_log;

# 提取请求里的 user id 作为 sticky key，覆盖三种入口:
#   GET /?user=alice&conv=...                → query string
#   GET /api/users/alice/conversations       → path (REST 对话目录)
#   POST /api/chat/alice/c-xxx/...           → path (REST chat)
# default 兜底为 $remote_addr 防止 user 拿不到时全部打到同一节点
map $request_uri $sticky_key {
    default                                 $remote_addr;
    "~^/api/users/(?<__u1>[^/]+)/"          $__u1;
    "~^/api/chat/(?<__u2>[^/]+)/"           $__u2;
    "~[?&]user=(?<__u3>[^&]+)"              $__u3;
}

upstream agent_nodes {
    # consistent hash: 同一 user 永远路由到同一节点
    # 一旦节点上下线, 仅少量 user 被重新分配 (vs ip_hash 每次都全量重哈希)
    hash $sticky_key consistent;

    server agent-1:8080 max_fails=3 fail_timeout=10s;
    server agent-2:8080 max_fails=3 fail_timeout=10s;
    server agent-3:8080 max_fails=3 fail_timeout=10s;

    keepalive 32;          # 复用到上游的 TCP 连接
}

server {
    listen 80;
    server_name _;

    # 前端静态资源 + SSE 都从这一个 location 走
    location / {
        proxy_pass http://agent_nodes;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # ===== SSE 关键配置 =====
        # 关闭缓冲: 否则 nginx 会等满一个 buffer 才下发, 前端没有打字机效果
        proxy_buffering off;
        # 关闭分块缓存
        proxy_cache off;
        # 长连接读超时 1h (LLM 长 prompt + 工具调用累计可能很久)
        proxy_read_timeout 1h;
        proxy_send_timeout 1h;
        # 不让 nginx 主动断
        proxy_socket_keepalive on;

        # 取消 chunked 编码（部分 SSE 库对此敏感）
        chunked_transfer_encoding on;
    }

    # 健康检查 endpoint (Spring Boot Actuator) — 不走 sticky
    location = /actuator/health {
        proxy_pass http://agent_nodes;
        access_log off;
    }
}
