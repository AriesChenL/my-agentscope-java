<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title th:text="${agentName} + ' · AgentScope Chat'">AgentScope Chat</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/chat.css(v=${assetVersion})}" />
    <!-- Markdown 渲染：marked.js 负责解析，DOMPurify 防 XSS（必须配套使用，单用 marked 不够安全） -->
    <script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js" defer></script>
</head>
<body>
<div class="aurora">
    <span class="aurora-blob a"></span>
    <span class="aurora-blob b"></span>
    <span class="aurora-blob c"></span>
</div>

<div class="app-shell">
    <!-- 左侧：会话列表 -->
    <aside class="sidebar glass">
        <div class="sidebar-head">
            <span class="sidebar-title">对话</span>
            <button class="btn-new" id="newConvBtn" title="新建对话">
                <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                新建
            </button>
        </div>
        <div class="conv-list" id="convList">
            <!-- JS 渲染 -->
        </div>
        <div class="sidebar-footer">
            <span class="user-pill">
                <svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                <span id="userId" th:text="${userId}">guest</span>
            </span>
        </div>
    </aside>

    <!-- 右侧：聊天主区 -->
    <div class="main-pane">
        <header class="topbar glass">
            <div class="brand">
                <svg class="brand-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <path d="M12 3v3M5.6 5.6l2.1 2.1M3 12h3M5.6 18.4l2.1-2.1M12 21v-3M18.4 18.4l-2.1-2.1M21 12h-3M18.4 5.6l-2.1 2.1"/>
                    <circle cx="12" cy="12" r="4"/>
                </svg>
                <div class="brand-text">
                    <span class="brand-name" id="convTitle">…</span>
                    <span class="brand-meta">
                        <span class="status-dot" id="statusDot"></span>
                        <span id="statusText">就绪</span>
                        <span class="model-tag" id="modelTag">…</span>
                    </span>
                </div>
            </div>
            <div class="user-info">
                <button class="btn-ghost" id="renameBtn" title="重命名当前会话">
                    <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                </button>
                <button class="btn-ghost" id="compactBtn" title="压缩上下文：用 LLM 摘要旧消息以节省后续 token">
                    <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 14 10 14 10 20"/><polyline points="20 10 14 10 14 4"/><line x1="14" y1="10" x2="21" y2="3"/><line x1="3" y1="21" x2="10" y2="14"/></svg>
                </button>
                <button class="btn-ghost" id="resetBtn" title="清空当前会话消息">
                    <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/></svg>
                </button>
            </div>
        </header>

        <main class="chat-area" id="chatArea">
            <div class="empty-hint glass" id="emptyHint">
                <h1>开始一段新的对话</h1>
                <p>支持工具调用、流式输出、多会话隔离与上下文自动压缩。</p>
                <ul class="example-prompts">
                    <li>现在几点了？</li>
                    <li>帮我算一下 (12 + 34) × 5 是多少？</li>
                    <li>用三句话介绍 ReAct agent 是什么。</li>
                </ul>
            </div>
        </main>

        <footer class="composer glass">
            <textarea id="input" rows="1" placeholder="输入消息，回车发送 · Shift+回车换行"
                      autofocus autocomplete="off" autocorrect="off" autocapitalize="off"
                      spellcheck="false"></textarea>
            <button class="send-btn" id="sendBtn" title="发送 (Enter)">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
            </button>
        </footer>
    </div>
</div>

<!-- 新建对话时选 provider 的弹窗（默认隐藏；JS 在点击"新建"时填充选项并展示） -->
<div class="modal-overlay" id="providerModal" hidden>
    <div class="modal glass">
        <h3>选择模型</h3>
        <p class="modal-hint">为新对话选择使用的模型；之后该会话会一直用这个模型回复。</p>
        <div class="provider-list" id="providerList">
            <!-- JS 注入 -->
        </div>
        <div class="modal-actions">
            <button class="btn-ghost" id="modalCancel">取消</button>
            <button class="btn-primary" id="modalConfirm">创建</button>
        </div>
    </div>
</div>

<script th:inline="javascript">
    window.AGENT_NAME = /*[[${agentName}]]*/ 'Assistant';
    window.USER_ID = /*[[${userId}]]*/ 'guest';
    window.CONV_ID = /*[[${convId}]]*/ '';
</script>
<script th:src="@{/chat.js(v=${assetVersion})}" defer></script>
</body>
</html>
