spring.application.name=my-agentscope-java

# 自动加载 application-local.properties 用于本地覆盖（其中存放 api-key 等敏感配置，已加入 .gitignore）。
# 文件不存在时不报错，便于 CI / 生产环境直接通过环境变量提供 key。
spring.config.import=optional:classpath:application-local.properties

# Agent 基础配置
agentscope.name=Assistant
agentscope.sys-prompt=You are a helpful AI assistant. Reply in Chinese.

# === 多 provider 同时启用 ===
# 用户在前端"新建对话"时可以三选一；agentscope.providers.default-id 决定"新建会话"
# 没指定 provider 时默认走哪个。每个 provider 块都有独立的 enabled / name / key。
agentscope.providers.default-id=openai

# --- OpenAI 兼容协议（DeepSeek / Moonshot / OpenRouter / vLLM）---
agentscope.providers.openai.enabled=true
agentscope.providers.openai.display-name=DeepSeek
agentscope.providers.openai.name=deepseek-v4-flash
agentscope.providers.openai.base-url=https://api.deepseek.com
agentscope.providers.openai.api-key-env=DEEPSEEK_API_KEY

# --- Anthropic Claude ---
agentscope.providers.anthropic.enabled=false
agentscope.providers.anthropic.display-name=Claude
agentscope.providers.anthropic.name=claude-sonnet-4-6
agentscope.providers.anthropic.base-url=https://api.anthropic.com
agentscope.providers.anthropic.api-key-env=ANTHROPIC_API_KEY

# --- Google Gemini ---
agentscope.providers.gemini.enabled=false
agentscope.providers.gemini.display-name=Gemini
agentscope.providers.gemini.name=gemini-3-flash-preview
agentscope.providers.gemini.base-url=https://generativelanguage.googleapis.com
agentscope.providers.gemini.api-key-env=GEMINI_API_KEY

# 调试用：开启后会打印每次请求的完整 JSON 和响应的每个 SSE chunk 到日志（INFO 级别）
# 可针对单个 provider 开关，例如 agentscope.providers.openai.log-http=true

# 出站 HTTP 代理（境内访问 Anthropic / Gemini 必备）。
# 启用后：所有 provider 的 HTTP 都走该代理。本地 Clash 默认是 127.0.0.1:7890。
agentscope.http.proxy.enabled=false
agentscope.http.proxy.host=127.0.0.1
agentscope.http.proxy.port=7890

# 多用户会话持久化（ChatService 使用）
agentscope.session.dir=./.agent-state
agentscope.session.max-iters=10

# === Human-in-the-Loop ===
# ask_user 内置工具（让 LLM 主动向用户提问；前端按 ui_type 渲染输入控件）。
# 默认启用；不需要时改 false 即可不向 toolkit 注册。
agentscope.hitl.ask-user-tool-enabled=true
# 危险工具人工审批清单：被列入的工具调用前会被 ToolConfirmationHook 拦截，
# 转 pending → 前端显示"批准 / 拒绝"按钮 → 批准则真正执行 / 拒绝则把"已拒绝"作为结果回填。
# 可在运行时通过 PUT /api/hitl/dangerous-tools 接口动态修改。
# 例：agentscope.hitl.dangerous-tools=delete_file,transfer_money

# 上下文自动压缩（达到 token 预算时用 LLM 摘要旧历史，避免上下文爆炸）
agentscope.memory.compaction-enabled=false
# 主触发：估算 token 超过该值即压缩（默认按字符近似，约 ±20% 误差）
agentscope.memory.compaction-max-tokens=8000
# 兜底触发：消息条数超过该值也触发；0 = 禁用
agentscope.memory.compaction-max-messages=0
# 压缩后至少保留的最近消息数
agentscope.memory.compaction-keep-recent=10
# 字符近似估算的密度（字符/token），中英文混合 2.8 较合理
agentscope.memory.compaction-chars-per-token=2.8
# agentscope.memory.compaction-instruction=自定义摘要指令

# 模型生成参数（注释掉则使用 provider 默认值）
# agentscope.generate.temperature=0.7
# agentscope.generate.top-p=0.9
# agentscope.generate.max-tokens=2048
# agentscope.generate.frequency-penalty=0.0
# agentscope.generate.presence-penalty=0.0
