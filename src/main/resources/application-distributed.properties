# =====================================================================
# 分布式部署 profile
# 启用：--spring.profiles.active=distributed 或 SPRING_PROFILES_ACTIVE=distributed
# =====================================================================

# 切到分布式模式：Session / ConversationDirectory 走 PostgreSQL
agentscope.cluster.mode=distributed

# 取消单机模式下的自动装配排除（让 DataSource / Flyway 正常装载）
spring.autoconfigure.exclude=

# === PostgreSQL 数据源 ===
# 生产建议用环境变量覆盖（不要把密码 commit 到 git）
spring.datasource.url=${PG_URL:jdbc:postgresql://localhost:5432/agentscope}
spring.datasource.username=${PG_USER:agent}
spring.datasource.password=${PG_PASSWORD:secret}
spring.datasource.driver-class-name=org.postgresql.Driver

# Hikari 连接池（生产可以调大；分布式部署下每节点 10-20 即可，PG 总连接数 = 节点数 * 池大小）
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=10000
spring.datasource.hikari.idle-timeout=600000

# === Flyway 迁移 ===
# 第一次启动时执行 db/migration/V1__init_distributed_schema.sql 建表
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# === Redis（分布式锁 + pub/sub） ===
# Redisson 自动从 spring.data.redis.* 读取配置，无需单独写 redisson.yaml
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.timeout=3000
# 注意：故意不写 spring.data.redis.password 这行。
# 因为 Spring 的 ${VAR:default} 语法会把空字符串视为"有 password 但是空"，导致 Redisson 发 AUTH "" 被无密码 Redis 拒绝。
# 需要密码时直接通过环境变量 SPRING_DATA_REDIS_PASSWORD=xxx 传入，Spring Boot 会自动绑定到 spring.data.redis.password。

# === 节点标识（用于跨节点协调，避免节点响应自己发的 interrupt 信号） ===
# 不配则用 hostname + 启动时间作为唯一 id
# agentscope.cluster.node-id=node-1
